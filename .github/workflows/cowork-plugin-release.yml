name: Build and Release Cowork Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build per-OS plugins
        working-directory: cowork-plugin/cloudradial-ucp
        run: node scripts/build-plugin.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: cowork-plugin/cloudradial-ucp/cloudradial-ucp-*.plugin
          generate_release_notes: true
          # Auto-mark v*-beta.* / v*-rc.* tags (any tag containing '-') as
          # pre-release so they don't get the "Latest" badge. Plain v*.*.*
          # tags publish as a normal release and become Latest.
          prerelease: ${{ contains(github.ref_name, '-') }}
