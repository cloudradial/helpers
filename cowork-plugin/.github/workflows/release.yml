name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package plugin
        run: |
          zip -r cloudradial-ucp.plugin . \
            -x "*.DS_Store" \
            -x ".git/*" \
            -x ".gitignore" \
            -x "scripts/*" \
            -x ".github/*" \
            -x "azure-mcp-server/*" \
            -x "servers/*" \
            -x "*.plugin" \
            -x ".mcp.json" \
            -x "references/swagger.json" \
            -x "node_modules/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: cloudradial-ucp.plugin
          generate_release_notes: true
